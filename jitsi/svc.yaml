apiVersion: v1
kind: Service
metadata:
  name: jitsi-web
  namespace: jitsi
  labels:
    app: jitsi
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: jitsi
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-jvb
  namespace: jitsi
  labels:
    app: jitsi
spec:
  type: LoadBalancer
  ports:
    - name: udp-10000
      port: 10000
      targetPort: 10000
      protocol: UDP
  selector:
    app: jitsi
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-prosody
  namespace: jitsi
  labels:
    app: jitsi
spec:
  type: ClusterIP
  ports:
    - name: xmpp-c2s
      port: 5222
      targetPort: 5222
      protocol: TCP
    - name: xmpp-s2s
      port: 5347
      targetPort: 5347
      protocol: TCP
    - name: bosh
      port: 5280
      targetPort: 5280
      protocol: TCP
  selector:
    app: jitsi
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-jicofo
  namespace: jitsi
  labels:
    app: jitsi
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: jitsi
