apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-clean-pvc
  namespace: wordpress
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-clean-apache-config
  namespace: wordpress
data:
  force-https.conf: |
    <IfModule mod_headers.c>
      RequestHeader set X-Forwarded-Proto "https"
      RequestHeader set HTTPS "on"
    </IfModule>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-clean
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress-clean
  template:
    metadata:
      labels:
        app: wordpress-clean
    spec:
      containers:
        - name: wordpress
          image: wordpress:7-php8.5-apache
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: wordpress-mariadb.wordpress.svc.cluster.local:3306
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-mariadb-password
                  key: password
            - name: WORDPRESS_DB_NAME
              value: wordpress
            - name: HTTPS
              value: "on"
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                $_SERVER['HTTPS'] = 'on';
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'http') {
                    $_SERVER['HTTP_X_FORWARDED_PROTO'] = 'https';
                }
          volumeMounts:
            - name: wordpress-clean-data
              mountPath: /var/www/html
            - name: wordpress-old-data
              mountPath: /old
              readOnly: true
            - name: apache-config
              mountPath: /etc/apache2/conf-enabled/force-https.conf
              subPath: force-https.conf
              readOnly: true
      volumes:
        - name: wordpress-clean-data
          persistentVolumeClaim:
            claimName: wordpress-clean-pvc
        - name: wordpress-old-data
          persistentVolumeClaim:
            claimName: wordpress-pvc
        - name: apache-config
          configMap:
            name: wordpress-clean-apache-config
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-clean
  namespace: wordpress
spec:
  selector:
    app: wordpress-clean
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
