apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wordpress-ingress
  namespace: wordpress
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`cngei.it`) || Host(`www.cngei.it`) || Host(`new.cngei.it`)
      services:
        - kind: Service
          name: wordpress-clean
          port: 80
  tls:
    secretName: wordpress-tls
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: webdav-transport
  namespace: wordpress
spec:
  forwardingTimeouts:
    dialTimeout: 300s
    responseHeaderTimeout: 300s
    idleConnTimeout: 0s
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wordpress-webdav-ingress
  namespace: wordpress
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`webdav-www.cngei.it`)
      services:
        - kind: Service
          name: wordpress-webdav
          port: 80
          serversTransport: webdav-transport
      middlewares:
        - name: webdav-headers
  tls:
    secretName: wordpress-tls
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: webdav-headers
  namespace: wordpress
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: https