apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-pvc
  namespace: wordpress
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:php8.5-apache
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: wordpress-mariadb.wordpress.svc.cluster.local:3306
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-mariadb-password
                  key: password
            - name: WORDPRESS_DB_NAME
              value: wordpress
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                    $_SERVER['HTTPS'] = 'on';
                }
                $_SERVER['HTTP_HOST'] = isset($_SERVER['HTTP_X_FORWARDED_HOST']) ? $_SERVER['HTTP_X_FORWARDED_HOST'] : $_SERVER['HTTP_HOST'];
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress
spec:
  selector:
    app: wordpress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-webdav
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress-webdav
  template:
    metadata:
      labels:
        app: wordpress-webdav
    spec:
      containers:
        - name: webdav
          image: bytemark/webdav:latest
          ports:
            - containerPort: 80
          env:
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: wordpress-ftp-credentials
                  key: ftp-user
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-ftp-credentials
                  key: ftp-pass
          securityContext:
            runAsUser: 33
            runAsGroup: 33
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/lib/dav
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-webdav
  namespace: wordpress
spec:
  selector:
    app: wordpress-webdav
  ports:
    - name: webdav
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
