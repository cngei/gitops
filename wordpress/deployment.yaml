apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-pvc
  namespace: wordpress
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:php8.5-apache
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: wordpress-mariadb.wordpress.svc.cluster.local:3306
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-mariadb-password
                  key: password
            - name: WORDPRESS_DB_NAME
              value: wordpress
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress
spec:
  selector:
    app: wordpress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-ftp
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress-ftp
  template:
    metadata:
      labels:
        app: wordpress-ftp
    spec:
      containers:
        - name: ftp
          image: stilliard/pure-ftpd:latest
          ports:
            - containerPort: 21
          env:
            - name: FTP_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: wordpress-ftp-credentials
                  key: ftp-user
            - name: FTP_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: wordpress-ftp-credentials
                  key: ftp-pass
            - name: FTP_USER_HOME
              value: /var/www/html
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-ftp
  namespace: wordpress
spec:
  selector:
    app: wordpress-ftp
  ports:
    - name: ftp
      protocol: TCP
      port: 21
      targetPort: 21
  type: ClusterIP
